# Alembic configuration for ASF
# ----------------------------------------------------------------------------
# This file is read by alembic when run from the ASF directory. The values
# are intentionally minimal: the database URL is supplied at runtime through
# the ASF_DATABASE_URL environment variable (read by env.py), and the
# migrations directory is the sibling ``alembic/`` package.
#
# A different script_location can be supplied on the command line:
#     alembic --config asf/alembic.ini -x asf_dir=/path/to/asf upgrade head
# but the defaults below match the layout checked into the repository.

[alembic]
# Path to the migration scripts (relative to this file's directory).
script_location = asf/alembic

# Revision file template.
file_template = %%(rev)s_%%(slug)s

# Search path for migration scripts (allow ``alembic/versions/`` to be
# imported as a package so the autogenerate tools can find revisions).
prepend_sys_path = .

# The ``sqlalchemy.url`` placeholder is intentionally empty — the real
# URL is supplied in env.py from ASF_DATABASE_URL. Leaving it blank
# here ensures we never bake a secret into the repo.
sqlalchemy.url =

# Timezone for ``create_date`` columns in the migration files.
timezone = UTC

# Maximum length for slugs in the revision filename.
truncate_slug_length = 40

# Allow .pyc files to be ignored when scanning for revisions.
sourceless = false

# Version path separator (the default ``os`` works on POSIX).
version_path_separator = os

# Path separator used by ``prepend_sys_path`` to split values on
# the colon (``:``) instead of the legacy space/comma behaviour. Set
# to ``os`` so the value matches the OS path separator (``:`` on
# POSIX, ``;`` on Windows).
path_separator = os

# Output encoding for revision scripts.
output_encoding = utf-8

[post_write_hooks]
# (Optional) Format generated migrations with ``black`` on save. Disabled
# by default because we handcraft migrations and prefer minimal churn.
# Uncomment to enable.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
# Alembic's env.py calls ``logging.config.fileConfig`` on the ini file,
# which requires ``[formatters]``, ``[handlers]``, and ``[loggers]``
# sections to be present even when no custom loggers are needed. The
# minimal config below keeps the default Python logging behaviour but
# satisfies Alembic's contract.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
